<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hady-calcul - Version Dynamique stable</title>
    <style>
        /* ================= DECORATION GLOBALE ET CENTRAGE PC ================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .calc-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            max-height: 850px;
            display: flex;
            flex-direction: column;
            padding: 10px 20px;
            background-color: #f4f6f9;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .calc-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .brand-title {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #5f738c;
            padding: 0 0 10px 0;
            text-transform: uppercase;
        }

        /* ================= ZONE MONITEUR DYNAMIQUE ================= */
        .screen-wrapper {
            position: relative;
            width: 100%;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            box-shadow: 0px 3px 8px rgba(0, 0, 0, 0.02);
            margin-bottom: 15px;
            /* Animation fluide lors du changement de mode */
            transition: all 0.3s ease-in-out; 
        }

        /* AJUSTEMENT DYNAMIQUE : Hauteur généreuse par défaut en mode Standard */
        .screen-wrapper.mode-standard {
            height: 180px; 
        }

        /* AJUSTEMENT DYNAMIQUE : Hauteur ultra-compacte en mode Scientifique (Image 2) */
        .screen-wrapper.mode-sci {
            height: 90px;
        }

        .screen-watermark {
            position: absolute;
            left: 20px;
            top: 15px;
            font-size: 10px;
            font-weight: 700;
            color: #cbd5e1; 
            letter-spacing: 1px;
            pointer-events: none;
        }

        .screen-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            text-align: right;
            font-family: inherit;
        }

        #operation-screen {
            font-size: 15px;
            color: #64748b;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        #screen {
            font-size: 32px;
            font-weight: 600;
            color: #0f172a;
            caret-color: #2196f3;
        }

        /* ================= CONFIGURATION DES TOUCHES ================= */
        .keyboard-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sci-grid {
            display: none; 
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 100%;
            animation: fadeInGrid 0.3s ease-in-out forwards;
        }

        .std-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
        }

        button {
            width: 100%;
            border: none;
            cursor: pointer;
            transition: background 0.15s, transform 0.05s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            transform: scale(0.94);
            filter: brightness(0.9);
        }

        /* Boutons Standard (Ronds) */
        .std-grid button {
            aspect-ratio: 1; 
            max-height: 75px;
            border-radius: 50%; 
            font-size: 19px;
            font-weight: 600;
            background-color: #ffffff; 
            color: #1e293b;
        }

        /* Boutons Scientifiques (Languettes fines) */
        .sci-grid button {
            height: 32px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            background-color: #e2e8f0;
            color: #475569;
        }

        /* RESTAURATION : Couleur bleue originale pour le bouton de mode */
        .btn-toggle { 
            background-color: #e8f0fe !important; 
            color: #1a73e8 !important; 
            border: 1px solid #d2e3fc;
        }
        
        /* Couleurs de suppression */
        .btn-clear { 
            background-color: #f8d7da !important; 
            color: #b71c1c !important; 
        }
        .btn-back { 
            background-color: #e2e8f0 !important; 
            color: #8d6e63 !important; 
        }

        .btn-const { background-color: #d1e7dd !important; color: #0f5132 !important; }
        
        /* Opérateurs */
        .btn-op { 
            background-color: #f8f9fa !important; 
            border: 1px solid #e2e8f0; 
            color: #2b9348 !important; 
            font-weight: 900 !important;
            font-size: 24px !important;
        }

        .btn-equal {
            background-color: #2b9348 !important;
            color: white !important;
            font-size: 24px !important;
            font-weight: 900 !important;
        }

        @keyframes fadeInGrid {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================= ÉCRAN DE BIENVENUE (SPLASH SCREEN) ================= */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .splash-logo {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #2196f3;
            text-transform: uppercase;
            animation: zoomIn 1.2s ease-out forwards;
            opacity: 0;
        }
        .splash-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: fadeIn 1.5s ease-out forwards;
            animation-delay: 0.3s;
            opacity: 0;
        }
        
        @keyframes zoomIn { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div id="splash-screen">
    <div class="splash-logo">Bienvenue</div>
    <div class="splash-subtitle">Dans Hady-calcul</div>
</div>

<div class="calc-container" id="calc-app">
    <div class="brand-title">Hady-calcul</div>
    
    <div class="screen-wrapper mode-standard" id="monitor-zone">
        <input type="text" id="operation-screen" value="" readonly placeholder="">
        <input type="text" id="screen" value="0" inputmode="none">
        <div class="screen-watermark">HADY-TECH</div>
    </div>
    
    <div class="keyboard-wrapper">
        <div class="sci-grid" id="sci-keys">
            <button onclick="calculerSci('sin')">Sin</button>
            <button onclick="calculerSci('cos')">Cos</button>
            <button onclick="calculerSci('tan')">Tan</button>
            <button onclick="calculerSci('sqrt')">√x</button>
            <button onclick="ajouter('**(1/')">ʸ√x</button>
            
            <button onclick="ajouter('**')">xʸ</button>
            <button onclick="calculerSci('log')">Log</button>
            <button onclick="calculerSci('exp')">e<sup>x</sup></button> 
            <button onclick="calculerSci('ln')">Ln</button>
            <button onclick="ajouter('(')">(</button>
            
            <button onclick="ajouter(')')">)</button>
            <button onclick="convertir('deg2rad')">°➔Rad</button>
            <button onclick="convertir('rad2deg')">Rad➔°</button>
            <button class="btn-const" onclick="ajouter(Math.PI)">π</button>
            <button class="btn-const" onclick="ajouter(Math.E)">e</button>
        </div>

        <div class="std-grid">
            <button class="btn-toggle" id="mode-btn" onclick="basculerMode()">Sci</button>
            <button class="btn-clear" onclick="effacer()">C</button>
            <button class="btn-back" onclick="supprimerUnChiffre()">⌫</button>
            <button class="btn-op" onclick="ajouter('/')">÷</button>

            <button onclick="ajouter('7')">7</button>
            <button onclick="ajouter('8')">8</button>
            <button onclick="ajouter('9')">9</button>
            <button class="btn-op" onclick="ajouter('*')">×</button>

            <button onclick="ajouter('4')">4</button>
            <button onclick="ajouter('5')">5</button>
            <button onclick="ajouter('6')">6</button>
            <button class="btn-op" onclick="ajouter('-')">-</button>

            <button onclick="ajouter('1')">1</button>
            <button onclick="ajouter('2')">2</button>
            <button onclick="ajouter('3')">3</button>
            <button class="btn-op" onclick="ajouter('+')">+</button>

            <button onclick="ajouter('0')">0</button>
            <button onclick="ajouter('.')">.</button>
            <button onclick="calculerSci('pourcent')">%</button>
            <button class="btn-equal" onclick="egal()">=</button>
        </div>
    </div>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            let splash = document.getElementById('splash-screen');
            let app = document.getElementById('calc-app');
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            app.classList.add('show');
        }, 2000);
    });

    let ecran = document.getElementById('screen');
    let ecranOperation = document.getElementById('operation-screen');
    let zoneMoniteur = document.getElementById('monitor-zone');
    let nouvelleSaisie = true;
    let modeScientifique = false;

    // CORRECTION DYNAMIQUE : Change la taille du moniteur selon le mode actif
    function basculerMode() {
        modeScientifique = !modeScientifique;
        let sciKeys = document.getElementById('sci-keys');
        let modeBtn = document.getElementById('mode-btn');

        if (modeScientifique) {
            sciKeys.style.display = 'grid';
            modeBtn.innerText = 'Std';
            
            // Applique la taille compacte pour le mode scientifique (Évite le débordement)
            zoneMoniteur.classList.remove('mode-standard');
            zoneMoniteur.classList.add('mode-sci');
        } else {
            sciKeys.style.display = 'none';
            modeBtn.innerText = 'Sci';
            
            // Redonne toute sa hauteur au moniteur en mode standard (Évite l'effet écrasé)
            zoneMoniteur.classList.remove('mode-sci');
            zoneMoniteur.classList.add('mode-standard');
        }
    }

    // FONCTIONS DE CALCUL RESTÉES STABLES
    function ajouter(valeur) {
        let texteActuel = ecran.value;
        let start = ecran.selectionStart;
        let end = ecran.selectionEnd;
        if (texteActuel === '0' || texteActuel === 'Erreur' || nouvelleSaisie) {
            if (['+', '-', '*', '/', '**', '**(1/', ')'].includes(valeur) && texteActuel !== 'Erreur') {
                ecran.value = texteActuel + valeur;
            } else { ecran.value = valeur; }
            nouvelleSaisie = false;
            setTimeout(() => { ecran.focus(); let posFin = ecran.value.length; ecran.setSelectionRange(posFin, posFin); }, 0);
        } else {
            ecran.value = texteActuel.substring(0, start) + valeur + texteActuel.substring(end);
            let nouvellePos = start + valeur.length;
            setTimeout(() => { ecran.focus(); ecran.setSelectionRange(nouvellePos, nouvellePos); }, 0);
        }
        ecranOperation.value = ecran.value; 
    }
    function supprimerUnChiffre() {
        let texteActuel = ecran.value;
        let start = ecran.selectionStart;
        let end = ecran.selectionEnd;
        if (texteActuel === 'Erreur' || texteActuel.length <= 1) { effacer(); return; }
        if (start !== end) { ecran.value = texteActuel.substring(0, start) + texteActuel.substring(end); setTimeout(() => { ecran.focus(); ecran.setSelectionRange(start, start); }, 0); } else if (start > 0) { ecran.value = texteActuel.substring(0, start - 1) + texteActuel.substring(start); setTimeout(() => { ecran.focus(); ecran.setSelectionRange(start - 1, start - 1); }, 0); }
        ecranOperation.value = ecran.value;
    }
    function effacer() { ecran.value = '0'; ecranOperation.value = ''; nouvelleSaisie = true; }
    function egal() { try { let operationFinale = ecran.value; let resultat = eval(operationFinale); if (resultat === Infinity || isNaN(resultat)) throw "Erreur"; ecranOperation.value = operationFinale; ecran.value = Number(resultat.toFixed(6)); nouvelleSaisie = true; } catch (e) { ecran.value = 'Erreur'; ecranOperation.value = ''; nouvelleSaisie = true; } }
    function convertir(type) { let valeur = parseFloat(ecran.value); if (isNaN(valeur)) return; ecranOperation.value = ecran.value; if (type === 'deg2rad') { ecran.value = Number((valeur * Math.PI / 180).toFixed(6)); } else if (type === 'rad2deg') { ecran.value = Number((valeur * 180 / Math.PI).toFixed(4)); } nouvelleSaisie = true; }
    function calculerSci(type) { let valeur = parseFloat(ecran.value); if (isNaN(valeur)) { try { valeur = eval(ecran.value); } catch(e) { ecran.value = 'Erreur'; return; } } try { let valeurRad = valeur * Math.PI / 180; ecranOperation.value = type + "(" + ecran.value + ")"; if (type === 'sin') ecran.value = Number(Math.sin(valeurRad).toFixed(6)); if (type === 'cos') ecran.value = Number(Math.cos(valeurRad).toFixed(6)); if (type === 'tan') { if (Math.abs(Math.cos(valeurRad)) < 1e-10) throw "Erreur"; ecran.value = Number(Math.tan(valeurRad).toFixed(6)); } if (type === 'sqrt') { if (valeur < 0) throw "Erreur"; ecran.value = Number(Math.sqrt(valeur).toFixed(6)); } if (type === 'log') { if (valeur <= 0) throw "Erreur"; ecran.value = Number(Math.log10(valeur).toFixed(6)); } if (type === 'ln') { if (valeur <= 0) throw "Erreur"; ecran.value = Number(Math.log(valeur).toFixed(6)); } if (type === 'exp') ecran.value = Number(Math.exp(valeur).toFixed(6)); if (type === 'pourcent') ecran.value = Number((valeur / 100).toFixed(6)); nouvelleSaisie = true; } catch (e) { ecran.value = 'Erreur'; ecranOperation.value = ''; nouvelleSaisie = true; } }
</script>
</body>
              </html>
