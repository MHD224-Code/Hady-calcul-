<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hady-calcul - Version Finale Incassable</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            user-select: none; /* Empêche la sélection bleue moche sur mobile */
        }
        .calc-container {
            width: 350px;
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #2d2d2d;
        }
        .brand-title {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #2196f3;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .screen-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        /* Transformation de l'input en div stylisée */
        #screen {
            width: 100%;
            height: 65px;
            background-color: #2d2d2d;
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 26px;
            text-align: right;
            padding: 10px 15px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        .screen-watermark {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.08);
            letter-spacing: 1px;
            z-index: 1;
            pointer-events: none;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            height: 52px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #3d3d3d;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }
        .btn-sci {
            background-color: #0d47a1;
            font-size: 14px;
        }
        .btn-toggle {
            background-color: #1565c0;
            border: 1px solid #2196f3;
        }
        .btn-const {
            background-color: #006064;
            font-size: 16px;
        }
        .btn-op {
            background-color: #e65100;
        }
        .btn-clear {
            background-color: #b71c1c;
        }
        .btn-back {
            background-color: #8d6e63;
        }
        .btn-equal {
            background-color: #1b5e20;
        }
        
        .mode-sci {
            display: none;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="brand-title">Hady-calcul</div>
    
    <div class="screen-wrapper">
        <div id="screen">0</div>
        <div class="screen-watermark">HADY-TECH</div>
    </div>
    
    <div class="btn-grid">
        <button class="btn-toggle mode-std" onclick="basculerMode()">Sci</button>
        <button class="btn-clear mode-std" onclick="effacer()">C</button>
        <button class="btn-back mode-std" onclick="supprimerUnChiffre()">⌫</button>
        <button class="btn-op mode-std" onclick="ajouter('/')">÷</button>

        <button class="btn-toggle mode-sci" onclick="basculerMode()">Std</button>
        <button class="btn-clear mode-sci" onclick="effacer()">C</button>
        <button class="btn-back mode-sci" onclick="supprimerUnChiffre()">⌫</button>
        <button class="btn-sci mode-sci" onclick="calculerSci('sin')">Sin</button>
        
        <button class="btn-sci mode-sci" onclick="calculerSci('cos')">Cos</button>
        <button class="btn-sci mode-sci" onclick="calculerSci('tan')">Tan</button>
        <button class="btn-sci mode-sci" onclick="calculerSci('sqrt')">√x</button>
        <button class="btn-sci mode-sci" onclick="ajouter('**(1/')">ʸ√x</button>
        
        <button class="btn-sci mode-sci" onclick="ajouter('**')">xʸ</button>
        <button class="btn-sci mode-sci" onclick="calculerSci('log')">Log</button>
        <button class="btn-sci mode-sci" onclick="calculerSci('exp')">eˣ</button>
        <button class="btn-sci mode-sci" onclick="calculerSci('ln')">Ln</button>
        
        <button class="btn-sci mode-sci" onclick="convertir('deg2rad')">°➔Rad</button>
        <button class="btn-sci mode-sci" onclick="convertir('rad2deg')">Rad➔°</button>
        <button class="btn-sci mode-sci" onclick="ajouter('(')">(</button>
        <button class="btn-sci mode-sci" onclick="ajouter(')')">)</button>
        
        <button class="btn-const mode-sci" onclick="ajouter(Math.PI)">π</button>
        <button class="btn-const mode-sci" onclick="ajouter(Math.E)">e</button>
        <button class="btn-op mode-sci" onclick="ajouter('/')">÷</button>
        <button class="btn-op mode-sci" onclick="ajouter('*')">x</button>

        <button onclick="ajouter('7')">7</button>
        <button onclick="ajouter('8')">8</button>
        <button onclick="ajouter('9')">9</button>
        <button class="btn-op mode-std" onclick="ajouter('*')">x</button>
        <button class="btn-op mode-sci" onclick="ajouter('-')">-</button>
        
        <button onclick="ajouter('4')">4</button>
        <button onclick="ajouter('5')">5</button>
        <button onclick="ajouter('6')">6</button>
        <button class="btn-op mode-std" onclick="ajouter('-')">-</button>
        <button class="btn-op mode-sci" onclick="ajouter('+')">+</button>
        
        <button onclick="ajouter('1')">1</button>
        <button onclick="ajouter('2')">2</button>
        <button onclick="ajouter('3')">3</button>
        <button class="btn-op mode-std" onclick="ajouter('+')">+</button>
        <button class="btn-sci mode-sci" onclick="calculerSci('pourcent')">%</button>
        
        <button onclick="ajouter('0')">0</button>
        <button onclick="ajouter('.')">.</button>
        <button class="btn-sci mode-std" onclick="calculerSci('pourcent')">%</button>
        <button class="btn-equal" onclick="egal()">=</button>
    </div>
</div>

<script>
    let ecran = document.getElementById('screen');
    let nouvelleSaisie = true;
    let modeScientifique = false;

    function basculerMode() {
        modeScientifique = !modeScientifique;
        let boutonsStd = document.querySelectorAll('.mode-std');
        let boutonsSci = document.querySelectorAll('.mode-sci');

        if (modeScientifique) {
            boutonsStd.forEach(btn => btn.style.display = 'none');
            boutonsSci.forEach(btn => btn.style.display = 'block');
        } else {
            boutonsStd.forEach(btn => btn.style.display = 'block');
            boutonsSci.forEach(btn => btn.style.display = 'none');
        }
    }

    function ajouter(valeur) {
        let texteActuel = ecran.innerText;

        if (texteActuel === '0' || texteActuel === 'Erreur' || nouvelleSaisie) {
            if (['+', '-', '*', '/', '**', '**(1/', ')'].includes(valeur) && texteActuel !== 'Erreur') {
                ecran.innerText = texteActuel + valeur;
            } else {
                ecran.innerText = valeur;
            }
            nouvelleSaisie = false;
        } else {
            // Écriture normale et fluide de gauche à droite
            ecran.innerText = texteActuel + valeur;
        }
    }

    function supprimerUnChiffre() {
        let texteActuel = ecran.innerText;

        if (texteActuel === 'Erreur' || texteActuel.length <= 1) {
            effacer();
            return;
        }

        // Supprime le tout dernier caractère saisis
        ecran.innerText = texteActuel.substring(0, texteActuel.length - 1);
    }

    function effacer() {
        ecran.innerText = '0';
        nouvelleSaisie = true;
    }

    function egal() {
        try {
            let resultat = eval(ecran.innerText);
            if (resultat === Infinity || isNaN(resultat)) throw "Erreur";
            
            ecran.innerText = Number(resultat.toFixed(6));
            nouvelleSaisie = true;
        } catch (e) {
            ecran.innerText = 'Erreur';
            nouvelleSaisie = true;
        }
    }

    function convertir(type) {
        let valeur = parseFloat(ecran.innerText);
        if (isNaN(valeur)) return;

        if (type === 'deg2rad') {
            ecran.innerText = Number((valeur * Math.PI / 180).toFixed(6));
        } else if (type === 'rad2deg') {
            ecran.innerText = Number((valeur * 180 / Math.PI).toFixed(4));
        }
        nouvelleSaisie = true;
    }

    function calculerSci(type) {
        let valeur = parseFloat(ecran.innerText);
        if (isNaN(valeur)) {
            try { valeur = eval(ecran.innerText); } catch(e) { ecran.innerText = 'Erreur'; return; }
        }

        try {
            let valeurRad = valeur * Math.PI / 180;

            if (type === 'sin') ecran.innerText = Number(Math.sin(valeurRad).toFixed(6));
            if (type === 'cos') ecran.innerText = Number(Math.cos(valeurRad).toFixed(6));
            if (type === 'tan') {
                if (Math.abs(Math.cos(valeurRad)) < 1e-10) throw "Erreur";
                ecran.innerText = Number(Math.tan(valeurRad).toFixed(6));
            }
            if (type === 'sqrt') {
                if (valeur < 0) throw "Erreur";
                ecran.innerText = Number(Math.sqrt(valeur).toFixed(6));
            }
            if (type === 'log') {
                if (valeur <= 0) throw "Erreur";
                ecran.innerText = Number(Math.log10(valeur).toFixed(6));
            }
            if (type === 'ln') {
                if (valeur <= 0) throw "Erreur";
                ecran.innerText = Number(Math.log(valeur).toFixed(6));
            }
            if (type === 'exp') ecran.innerText = Number(Math.exp(valeur).toFixed(6));
            if (type === 'pourcent') ecran.innerText = Number((valeur / 100).toFixed(6));
            
            nouvelleSaisie = true;
        } catch (e) {
            ecran.innerText = 'Erreur';
            nouvelleSaisie = true;
        }
    }
</script>
</body>
</html>
